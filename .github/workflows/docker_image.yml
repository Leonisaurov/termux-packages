name: Docker image

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Clone repository
      uses: actions/checkout@v7

    - name: Set lowercase owner
      run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: scripts/
        load: true
        tags: ghcr.io/${{ env.OWNER }}/package-builder:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to GHCR
      run: |
        for t in 1 2 3; do
          if docker push ghcr.io/${{ env.OWNER }}/package-builder:latest; then
            break
          else
            if [ "$t" = "3" ]; then
              echo "Giving up after 3 attempts"
              exit 1
            fi
            sleep 20
          fi
        done
