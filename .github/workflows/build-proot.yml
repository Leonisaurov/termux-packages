name: Build proot

on:
  push:
    paths:
      - 'packages/proot/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
    - name: Clone repository
      uses: actions/checkout@v7

    - name: Enable zram
      uses: ./.github/actions/zram
      with:
        algorithm: zstd
        size: 16G
        priority: 100
        device_name: /dev/zram0

    - name: Build proot
      run: ./scripts/run-docker.sh ./build-package.sh -I -a aarch64 --format pacman proot

    - name: Collect package files
      if: always()
      run: |
        mkdir -p ./artifacts
        mv output/*.pkg.tar.xz ./artifacts/ 2>/dev/null || true

    - name: Upload to GitHub Release
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        FILE=$(ls ./artifacts/*.pkg.tar.xz 2>/dev/null | head -1)
        [ -f "$FILE" ] || exit 0
        gh release delete proot-latest --yes --cleanup-tag 2>/dev/null || true
        gh release create proot-latest "$FILE" \
          --repo "${{ github.repository }}" \
          --title "proot-latest" \
          --latest \
          --notes "proot aarch64 from ${{ github.sha }}"

    - name: Store package files
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: proot-aarch64-${{ github.sha }}
        path: ./artifacts/*
