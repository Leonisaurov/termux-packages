name: Build proot

on:
  push:
    paths:
      - 'packages/proot/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
    - name: Clone repository
      uses: actions/checkout@v7

    - name: Enable zram
      uses: ./.github/actions/zram
      with:
        algorithm: zstd
        size: 16G
        priority: 100
        device_name: /dev/zram0

    - name: Free disk space
      run: ./scripts/free-space.sh

    - name: Clean corrupted Docker images
      run: |
        docker rm -f termux-package-builder 2>/dev/null || true
        docker rmi ghcr.io/termux/package-builder:latest 2>/dev/null || true
        docker image prune -f 2>/dev/null || true

    - name: Build proot
      run: ./scripts/run-docker.sh ./build-package.sh -I -a aarch64 --format pacman proot

    - name: Collect package files
      if: always()
      run: |
        mkdir -p ./artifacts
        test -d output && mv output/*.pkg.tar.xz ./artifacts/ 2>/dev/null || true
        test -d output && mv output/*.deb ./artifacts/ 2>/dev/null || true

    - name: Upload to GitHub Release
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        for f in ./artifacts/*.pkg.tar.xz ./artifacts/*.deb; do
          [ -f "$f" ] || continue
          gh release delete proot-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create proot-latest "$f" \
            --repo "${{ github.repository }}" \
            --title "proot-latest" \
            --latest \
            --notes "Latest proot build from ${{ github.sha }}"
          break
        done

    - name: Store package files
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: proot-aarch64-${{ github.sha }}
        path: ./artifacts/*
